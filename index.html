<!-- 
  GOOGLE SHEETS REALTIME INTEGRATION SCRIPT
  Add this to your index.html just before closing </body> tag
  
  Configuration: Update these values
  ===================================
-->

<script>
// ========== GOOGLE SHEETS CONFIGURATION ==========
const GOOGLE_CONFIG = {
  clientId: 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com',
  spreadsheetId: 'YOUR_SPREADSHEET_ID',
  sheetName: 'Sheet1',
  range: 'Sheet1!A:H', // Range to read/write (adjust columns as needed)
  scope: 'https://www.googleapis.com/auth/spreadsheets',
  discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4']
};

// ========== GOOGLE SHEETS SERVICE CLASS ==========
class GoogleSheetsService {
  constructor(config) {
    this.config = config;
    this.isAuthorized = false;
    this.tokenClient = null;
  }

  // Initialize Google API
  async init() {
    try {
      await gapi.client.init({
        apiKey: undefined, // Not needed for OAuth
        clientId: this.config.clientId,
        discoveryDocs: this.config.discoveryDocs,
        scopes: [this.config.scope]
      });

      // Set token client for OAuth
      this.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: this.config.clientId,
        scope: this.config.scope,
        callback: (resp) => {
          this.isAuthorized = true;
          console.log('✓ Google OAuth authorized');
        }
      });

      console.log('✓ Google Sheets Service initialized');
    } catch (err) {
      console.error('Failed to initialize Google Sheets:', err);
    }
  }

  // Request OAuth authorization
  async authorize() {
    if (gapi.client.getToken() === null) {
      this.tokenClient.requestAccessToken({prompt: 'consent'});
    } else {
      this.tokenClient.requestAccessToken({prompt: ''});
    }
  }

  // Check authorization status
  isAuthorized() {
    return gapi.client.getToken() !== null;
  }

  // Get data from Google Sheet
  async getData(range = null) {
    try {
      range = range || this.config.range;
      const response = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: this.config.spreadsheetId,
        range: range
      });

      const values = response.result.values || [];
      console.log('✓ Retrieved', values.length, 'rows from Google Sheets');
      return values;
    } catch (err) {
      console.error('Error reading Google Sheets:', err);
      return [];
    }
  }

  // Append data to Google Sheet
  async appendData(values) {
    try {
      const resource = {
        values: Array.isArray(values[0]) ? values : [values]
      };

      const response = await gapi.client.sheets.spreadsheets.values.append({
        spreadsheetId: this.config.spreadsheetId,
        range: this.config.range,
        valueInputOption: 'RAW',
        resource: resource
      });

      console.log('✓ Data appended:', response.result.updates.updatedRows, 'rows');
      return response;
    } catch (err) {
      console.error('Error appending data:', err);
      return null;
    }
  }

  // Update specific range in Google Sheet
  async updateData(range, values) {
    try {
      const resource = {
        values: Array.isArray(values[0]) ? values : [values]
      };

      const response = await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId: this.config.spreadsheetId,
        range: range,
        valueInputOption: 'RAW',
        resource: resource
      });

      console.log('✓ Data updated:', response.result.updatedRows, 'rows');
      return response;
    } catch (err) {
      console.error('Error updating data:', err);
      return null;
    }
  }

  // Batch update (for multiple operations)
  async batchUpdate(requests) {
    try {
      const response = await gapi.client.sheets.spreadsheets.batchUpdate({
        spreadsheetId: this.config.spreadsheetId,
        resource: { requests: requests }
      });

      console.log('✓ Batch update completed');
      return response;
    } catch (err) {
      console.error('Error in batch update:', err);
      return null;
    }
  }

  // Get range in A1 notation
  getRange(sheet, startRow, startCol, endRow, endCol) {
    const colToLetter = (col) => String.fromCharCode(65 + col);
    return `${sheet}!${colToLetter(startCol)}${startRow}:${colToLetter(endCol)}${endRow}`;
  }
}

// ========== REALTIME SYNC SERVICE ==========
class RealtimeSyncService {
  constructor(sheetsService) {
    this.sheets = sheetsService;
    this.syncInterval = 5000; // Sync every 5 seconds
    this.isSyncing = false;
    this.lastSyncData = null;
    this.syncCallbacks = [];
  }

  // Register callback for data changes
  onDataChange(callback) {
    this.syncCallbacks.push(callback);
  }

  // Start realtime sync polling
  startSync() {
    console.log('🔄 Starting realtime sync...');
    this.syncLoop();
  }

  // Stop realtime sync
  stopSync() {
    console.log('⏸️ Stopping realtime sync');
    this.isSyncing = false;
  }

  // Main sync loop
  async syncLoop() {
    this.isSyncing = true;
    while (this.isSyncing) {
      try {
        await this.sync();
        await new Promise(resolve => setTimeout(resolve, this.syncInterval));
      } catch (err) {
        console.error('Sync error:', err);
        await new Promise(resolve => setTimeout(resolve, this.syncInterval));
      }
    }
  }

  // Perform single sync
  async sync() {
    try {
      const data = await this.sheets.getData();
      
      // Check if data changed
      if (JSON.stringify(data) !== JSON.stringify(this.lastSyncData)) {
        this.lastSyncData = data;
        
        // Trigger all callbacks
        this.syncCallbacks.forEach(callback => {
          try {
            callback(data);
          } catch (err) {
            console.error('Callback error:', err);
          }
        });

        // Show realtime indicator
        this.showSyncIndicator();
      }
    } catch (err) {
      console.error('Sync error:', err);
    }
  }

  // Show visual indicator that sync occurred
  showSyncIndicator() {
    const indicator = document.getElementById('realtimeIndicator');
    if (indicator) {
      indicator.classList.add('pulse');
      setTimeout(() => indicator.classList.remove('pulse'), 1000);
    }
  }
}

// ========== ENFORCEMENT DATA SYNC ==========
class EnforcementDataSync {
  constructor(sheetsService) {
    this.sheets = sheetsService;
  }

  // Format timecard entry for Google Sheets
  formatEntry(entry) {
    const now = new Date();
    return [
      now.toLocaleDateString('ms-MY'),
      entry.checkIn || '',
      entry.checkOut || '',
      entry.location || '',
      entry.status || 'Active',
      entry.notes || '',
      entry.officer || 'System',
      new Date().toISOString()
    ];
  }

  // Send timecard data to Google Sheets
  async sendTimecard(entry) {
    try {
      const values = [this.formatEntry(entry)];
      await this.sheets.appendData(values);
      console.log('✓ Timecard synced to Google Sheets');
      return true;
    } catch (err) {
      console.error('Error syncing timecard:', err);
      return false;
    }
  }

  // Send enforcement action to Google Sheets
  async sendEnforcement(action) {
    try {
      const entry = {
        checkIn: action.time || new Date().toLocaleTimeString(),
        location: action.location || 'N/A',
        status: action.type || 'Enforcement',
        notes: action.details || '',
        officer: action.officer || 'System'
      };
      return await this.sendTimecard(entry);
    } catch (err) {
      console.error('Error syncing enforcement:', err);
      return false;
    }
  }

  // Sync all local data to Google Sheets
  async syncAllData(dataArray) {
    try {
      const values = dataArray.map(entry => this.formatEntry(entry));
      if (values.length > 0) {
        await this.sheets.appendData(values);
        console.log('✓', values.length, 'entries synced to Google Sheets');
        return true;
      }
      return false;
    } catch (err) {
      console.error('Error batch syncing:', err);
      return false;
    }
  }
}

// ========== INITIALIZATION ==========
let googleSheets, realtimeSync, enforcementSync;

// Load Google API library
function loadGoogleAPI() {
  const script = document.createElement('script');
  script.src = 'https://accounts.google.com/gsi/client';
  script.async = true;
  script.defer = true;
  document.head.appendChild(script);

  const gapiScript = document.createElement('script');
  gapiScript.src = 'https://apis.google.com/js/api.js';
  gapiScript.onload = () => {
    gapi.load('client', async () => {
      googleSheets = new GoogleSheetsService(GOOGLE_CONFIG);
      await googleSheets.init();
      console.log('✓ Google Sheets API ready');
    });
  };
  document.head.appendChild(gapiScript);
}

// Initialize when page loads
document.addEventListener('DOMContentLoaded', () => {
  loadGoogleAPI();
});

// ========== PUBLIC API ==========

// Call this when user logs in
async function initializeGoogleSheets() {
  try {
    if (!googleSheets) {
      console.error('Google Sheets not ready');
      return false;
    }
    
    await googleSheets.authorize();
    
    // Initialize sync services
    realtimeSync = new RealtimeSyncService(googleSheets);
    enforcementSync = new EnforcementDataSync(googleSheets);
    
    // Listen for data changes
    realtimeSync.onDataChange((data) => {
      console.log('📊 Google Sheets updated:', data.length, 'rows');
      // Update UI with new data
      updateEnforcementTable(data);
    });
    
    // Start syncing
    realtimeSync.startSync();
    
    console.log('✓ Google Sheets realtime sync initialized');
    return true;
  } catch (err) {
    console.error('Failed to initialize Google Sheets:', err);
    return false;
  }
}

// Send timecard entry
async function sendTimecard(entry) {
  if (!enforcementSync) {
    console.error('Sync service not ready');
    return false;
  }
  return await enforcementSync.sendTimecard(entry);
}

// Send enforcement data
async function sendEnforcement(action) {
  if (!enforcementSync) {
    console.error('Sync service not ready');
    return false;
  }
  return await enforcementSync.sendEnforcement(action);
}

// Get data from Google Sheets
async function getGoogleSheetsData() {
  if (!googleSheets) {
    console.error('Google Sheets not ready');
    return [];
  }
  return await googleSheets.getData();
}

// Update enforcement table with data from Google Sheets
function updateEnforcementTable(data) {
  const tbody = document.querySelector('.enf-table tbody');
  if (!tbody || !data || data.length < 2) return; // Skip header row
  
  tbody.innerHTML = '';
  
  // Skip first row (headers)
  for (let i = 1; i < data.length; i++) {
    const row = data[i];
    const tr = document.createElement('tr');
    
    tr.innerHTML = `
      <td>${row[0] || ''}</td>
      <td>${row[1] || ''}</td>
      <td>${row[2] || ''}</td>
      <td>${row[3] || ''}</td>
      <td><span class="badge badge-blue">${row[4] || 'N/A'}</span></td>
      <td>${row[5] || ''}</td>
    `;
    
    tbody.appendChild(tr);
  }
}

// Stop sync when user logs out
function stopGoogleSheetsSync() {
  if (realtimeSync) {
    realtimeSync.stopSync();
  }
  console.log('✓ Google Sheets sync stopped');
}

console.log('✓ Google Sheets realtime integration script loaded');
</script>
